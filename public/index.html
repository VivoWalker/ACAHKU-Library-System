    async function addBook() {
      const book_id = document.getElementById('bookBookId').value.trim();
      const title = document.getElementById('bookTitle').value.trim();
      const author = document.getElementById('bookAuthor').value.trim();
      const isbn = document.getElementById('bookIsbn').value.trim();
      const location = document.getElementById('bookLocation').value.trim();
      const book_type = document.getElementById('bookType').value.trim();
      if (!book_id || !title) { showToast('Book ID and Title required', 'error'); return; }
      try {
        const res = await fetch('/api/books', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ book_id, title, author_name: author, isbn, location, book_type })
        });
        if (res.ok) { showToast(t('bookAdded'), 'success'); closeModal('addBookModal'); loadAdminBooks(); }
        else { const data = await res.json(); showToast(data.error || 'Error', 'error'); }
      } catch { showToast('Network error', 'error'); }
    }

    async function deleteBook(bookId) {
      showConfirm(t('deleteBookConfirm'), t('cannotUndo'), async () => {
        try {
          const res = await fetch('/api/books/' + bookId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
          if (res.ok) { showToast(t('bookDeleted'), 'success'); loadAdminBooks(); }
          else { const data = await res.json(); showToast(data.error || 'Error', 'error'); }
        } catch { showToast('Network error', 'error'); }
      });
    }

    async function editBook(bookId) {
      try {
        const res = await fetch('/api/books/' + bookId, { headers: { 'Authorization': 'Bearer ' + token } });
        const book = await res.json();
        document.getElementById('editBookId').value = book.id;
        document.getElementById('editBookBookId').value = book.book_id;
        document.getElementById('editBookTitle').value = book.title;
        document.getElementById('editBookAuthor').value = book.author_name || '';
        document.getElementById('editBookIsbn').value = book.isbn || '';
        document.getElementById('editBookLocation').value = book.location || '';
        document.getElementById('editBookType').value = book.book_type || '';
        document.getElementById('editBookStatus').value = book.status || 'available';
        document.getElementById('editBookModal').classList.add('active');
      } catch { showToast('Error loading book', 'error'); }
    }

    async function saveBookEdit() {
      const id = document.getElementById('editBookId').value;
      const book_id = document.getElementById('editBookBookId').value.trim();
      const title = document.getElementById('editBookTitle').value.trim();
      const author_name = document.getElementById('editBookAuthor').value.trim();
      const isbn = document.getElementById('editBookIsbn').value.trim();
      const location = document.getElementById('editBookLocation').value.trim();
      const book_type = document.getElementById('editBookType').value.trim();
      const status = document.getElementById('editBookStatus').value;
      if (!book_id || !title) { showToast('Book ID and Title required', 'error'); return; }
      try {
        const res = await fetch('/api/books/' + id, {
          method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ book_id, title, author_name, isbn, location, book_type, status })
        });
        if (res.ok) { showToast(t('bookUpdated'), 'success'); closeModal('editBookModal'); loadAdminBooks(); }
        else { const data = await res.json(); showToast(data.error || 'Error', 'error'); }
      } catch { showToast('Network error', 'error'); }
    }

    async function loadAdminBorrows() {
      const container = document.getElementById('adminBorrowsContainer');
      container.innerHTML = '<div class="loading">' + t('loading') + '</div>';
      try {
        const res = await fetch('/api/records', { headers: { 'Authorization': 'Bearer ' + token } });
        const records = await res.json();
        if (records.length === 0) { container.innerHTML = '<div class="empty-state">' + t('noBorrows') + '</div>'; return; }
        const now = new Date();
        container.innerHTML = `<div class="table-wrap"><table>
          <thead><tr><th>${t('bookId')}</th><th>${t('bookTitle')}</th><th>借書者</th><th>${t('borrowDate')}</th><th>${t('dueDate')}</th><th>${t('actualReturn')}</th><th>${t('fine')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr></thead>
          <tbody>${records.map(r => {
            const due = new Date(r.due_date);
            const overdue = !r.returned && due < now;
            return `<tr>
              <td>${escHtml(r.code)}</td>
              <td>${escHtml(r.title)}</td>
              <td>${escHtml(r.borrower_name || r.username)}</td>
              <td>${fmtDate(r.borrow_date)}</td>
              <td class="${overdue ? 'overdue-cell' : ''}">${fmtDate(r.due_date)}</td>
              <td>${r.returned ? fmtDate(r.return_date) : '-'}</td>
              <td>${r.fine && r.fine > 0 ? 'HK$' + r.fine : '-'}</td>
              <td><span class="status-badge ${r.returned ? 'status-available' : (overdue ? 'status-borrowed' : 'status-available')}">${r.returned ? t('returned2') : (overdue ? t('overdue') : t('borrowing'))}</span></td>
              <td>${!r.returned ? `<button class="btn-sm return" onclick="adminReturnBook(${r.id})">${t('return')}</button>` : ''}</td>
            </tr>`;
          }).join('')}</tbody></table></div>`;
      } catch { container.innerHTML = '<div class="empty-state">' + t('noBorrows') + '</div>'; }
    }

    async function adminReturnBook(recordId) {
      try {
        const res = await fetch('/api/return/' + recordId, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (res.ok) {
          let msg = t('returnSuccess');
          if (data.fine && data.fine > 0) msg += ' ' + t('fineAmount').replace('{n}', data.fine);
          showToast(msg, 'success');
          loadAdminBorrows(); loadAdminStats();
        }
        else { showToast(data.error || 'Error', 'error'); }
      } catch { showToast('Network error', 'error'); }
    }

    async function loadUsers() {
      const container = document.getElementById('usersContainer');
      container.innerHTML = '<div class="loading">' + t('loading') + '</div>';
      try {
        const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
        const users = await res.json();
        if (users.length === 0) { container.innerHTML = '<div class="empty-state">' + t('noUsersMsg') + '</div>'; return; }
        container.innerHTML = `<div class="table-wrap"><table>
          <thead><tr><th>${t('username')}</th><th>${t('displayName')}</th><th>${t('role')}</th><th>${t('actions')}</th></tr></thead>
          <tbody>${users.map(u => `<tr>
            <td>${escHtml(u.username)}</td>
            <td>${escHtml(u.display_name || '-')}</td>
            <td>${u.role === 'admin' ? t('admin') : t('borrower')}</td>
            <td>${u.id !== currentUser.id ? `<button class="btn-sm delete" onclick="deleteUser(${u.id})">${t('delete')}</button>` : '-'}</td>
          </tr>`).join('')}</tbody></table></div>`;
      } catch { container.innerHTML = '<div class="empty-state">' + t('noUsers') + '</div>'; }
    }

    function showAddUserModal() {
      document.getElementById('newUsername').value = '';
      document.getElementById('newDisplayName').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = 'borrower';
      document.getElementById('addUserModal').classList.add('active');
    }

    async function addUser() {
      const username = document.getElementById('newUsername').value.trim();
      const display_name = document.getElementById('newDisplayName').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      if (!username || !password) { showToast('Fields required', 'error'); return; }
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ username, password, role, display_name })
        });
        if (res.ok) { showToast(t('userAdded'), 'success'); closeModal('addUserModal'); loadUsers(); }
        else { const data = await res.json(); showToast(data.error || 'Error', 'error'); }
      } catch { showToast('Network error', 'error'); }
    }

    async function deleteUser(userId) {
      showConfirm(t('deleteUserConfirm'), t('cannotUndo'), async () => {
        try {
          const res = await fetch('/api/admin/users/' + userId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
          if (res.ok) { showToast(t('userDeleted'), 'success'); loadUsers(); }
          else { const data = await res.json(); showToast(data.error || 'Error', 'error'); }
        } catch { showToast('Network error', 'error'); }
      });
    }

    // Confirm modal
    function showConfirm(msg, subMsg, callback) {
      document.getElementById('confirmMsg').textContent = msg;
      document.getElementById('confirmSubMsg').textContent = subMsg;
      confirmCallback = callback;
      document.getElementById('confirmModal').classList.add('active');
    }

    function confirmAction() {
      if (confirmCallback) confirmCallback();
      closeModal('confirmModal');
    }

    // Helpers
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function renderPagination(page, totalPages, containerId, callback) {
      const container = document.getElementById(containerId);
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      container.innerHTML = `
        <button ${page <= 1 ? 'disabled' : ''} onclick="${callback}(${page - 1})">&laquo; Prev</button>
        <span class="page-info">${page} / ${totalPages}</span>
        <button ${page >= totalPages ? 'disabled' : ''} onclick="${callback}(${page + 1})">Next &raquo;</button>
      `;
    }

    function fmtDate(d) {
      if (!d) return '-';
      const dt = new Date(d);
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    }

    function escHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Header lang toggle
    document.getElementById('headerLangToggle').querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        localStorage.setItem('lang', currentLang);
        applyLang();
      });
    });

    // ==================== BORROWER: BORROW HISTORY ====================
    async function loadBorrowHistory() {
      const container = document.getElementById('borrowHistoryContainer');
      container.innerHTML = '<div class="loading">' + t('loading') + '</div>';
      try {
        const res = await fetch('/api/records', { headers: { 'Authorization': 'Bearer ' + token } });
        const records = await res.json();
        if (records.length === 0) {
          container.innerHTML = '<div class="empty-state">' + t('noHistoryMsg') + '</div>';
          return;
        }
        const now = new Date();
        container.innerHTML = `<div class="table-wrap"><table>
          <thead><tr><th>${t('bookTitle')}</th><th>${t('borrowDate')}</th><th>${t('dueDate')}</th><th>${t('actualReturn')}</th><th>${t('status')}</th></tr></thead>
          <tbody>${records.map(r => {
            const due = new Date(r.due_date);
            const overdue = !r.returned && due < now;
            const diff = r.returned ? null : Math.ceil((due - now) / (1000*60*60*24));
            let statusText = r.returned ? t('returned2') : (overdue ? t('overdue') : t('daysLeft').replace('{n}', diff));
            return `<tr class="${overdue ? 'overdue-cell' : ''}">
              <td>${escHtml(r.title)}</td>
              <td>${fmtDate(r.borrow_date)}</td>
              <td>${fmtDate(r.due_date)}</td>
              <td>${r.returned ? fmtDate(r.return_date) : '-'}</td>
              <td>${statusText}</td>
            </tr>`;
          }).join('')}</tbody></table></div>`;
      } catch { container.innerHTML = '<div class="empty-state">' + t('noHistory') + '</div>'; }
    }

    function renderPolicy() {
      const container = document.getElementById('policyContainer');
      if (currentLang === 'zh-TW') {
        container.innerHTML = `
          <div class="policy-section"><h3 data-i18n="policyTitle">${t('policyTitle')}</h3>
          <p>${t('policyIntro')}</p></div>
          <div class="policy-section"><h3>1. ${t('policyRule1Title')}</h3><p>${t('policyRule1')}</p></div>
          <div class="policy-section"><h3>2. ${t('policyRule2Title')}</h3><p>${t('policyRule2')}</p></div>
          <div class="policy-section"><h3>3. ${t('policyRule3Title')}</h3><p>${t('policyRule3')}</p></div>
          <div class="policy-section"><h3>4. ${t('policyRule4Title')}</h3><p>${t('policyRule4')}</p></div>
          <div class="policy-section"><h3>5. ${t('policyRule5Title')}</h3><p>${t('policyRule5')}</p></div>
          <p class="warning" style="margin-top:16px;">⚠️ ${t('policyWarning')}</p>`;
      } else {
        container.innerHTML = `
          <div class="policy-section"><h3 data-i18n="policyTitle">${t('policyTitle')}</h3>
          <p>${t('policyIntro')}</p></div>
          <div class="policy-section"><h3>1. ${t('policyRule1Title')}</h3><p>${t('policyRule1')}</p></div>
          <div class="policy-section"><h3>2. ${t('policyRule2Title')}</h3><p>${t('policyRule2')}</p></div>
          <div class="policy-section"><h3>3. ${t('policyRule3Title')}</h3><p>${t('policyRule3')}</p></div>
          <div class="policy-section"><h3>4. ${t('policyRule4Title')}</h3><p>${t('policyRule4')}</p></div>
          <div class="policy-section"><h3>5. ${t('policyRule5Title')}</h3><p>${t('policyRule5')}</p></div>
          <p class="warning" style="margin-top:16px;">⚠️ ${t('policyWarning')}</p>`;
      }
    }

    // ==================== ADMIN: BATCH DELETE ====================
    let batchBooksCache = [];

    async function loadBatchBooks() {
      const q = document.getElementById('batchSearchInput').value.trim();
      const container = document.getElementById('batchBooksContainer');
      container.innerHTML = '<div class="loading">' + t('loading') + '</div>';
      try {
        const params = new URLSearchParams({ limit: 100 });
        if (q) params.append('q', q);
        const res = await fetch('/api/books?' + params, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        batchBooksCache = data.books;
        if (data.books.length === 0) {
          container.innerHTML = '<div class="empty-state">' + t('noBooks') + '</div>';
          return;
        }
        container.innerHTML = data.books.map(b => `
          <div class="batch-book-item">
            <input type="checkbox" class="batch-check" data-id="${b.id}" onchange="updateBatchCount()">
            <div class="batch-book-info">
              <div class="batch-book-title">${escHtml(b.title)}</div>
              <div class="batch-book-meta">${escHtml(b.book_id)} | ${escHtml(b.author_name || '-')} | <span class="status-badge ${b.status === 'available' ? 'status-available' : 'status-borrowed'}">${b.status === 'available' ? t('available') : t('borrowed')}</span></div>
            </div>
          </div>
        `).join('');
        updateBatchCount();
      } catch { container.innerHTML = '<div class="empty-state">' + t('noBooks') + '</div>'; }
    }

    function updateBatchCount() {
      const checked = document.querySelectorAll('.batch-check:checked').length;
      const countEl = document.getElementById('batchSelectedCount');
      const actionsBar = document.getElementById('batchActionsBar');
      if (checked > 0) {
        countEl.textContent = t('selectedCount').replace('{n}', checked);
        actionsBar.classList.remove('hidden');
      } else {
        countEl.textContent = t('noItemsSelected');
        actionsBar.classList.add('hidden');
      }
    }

    document.getElementById('batchSelectAll').addEventListener('change', function() {
      document.querySelectorAll('.batch-check').forEach(c => c.checked = this.checked);
      updateBatchCount();
    });

    async function batchDeleteBooks() {
      const ids = Array.from(document.querySelectorAll('.batch-check:checked')).map(c => c.dataset.id);
      if (ids.length === 0) return;
      showConfirm(t('deleteSelected') + ' (' + ids.length + ')?', t('cannotUndo'), async () => {
        let deleted = 0;
        for (const id of ids) {
          try {
            await fetch('/api/books/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            deleted++;
          } catch (e) {}
        }
        showToast(t('bookDeleted') + ' (' + deleted + ')', 'success');
        document.getElementById('batchSelectAll').checked = false;
        loadBatchBooks();
        loadAdminBooks();
        loadAdminStats();
      });
    }

    // ==================== ADMIN: EXPORT ====================
    async function exportData(type) {
      try {
        let data, filename, cols;
        if (type === 'books') {
          const res = await fetch('/api/books?limit=10000', { headers: { 'Authorization': 'Bearer ' + token } });
          const d = await res.json();
          data = d.books;
          filename = 'books.csv';
          cols = ['book_id', 'title', 'author_name', 'isbn', 'location', 'status'];
        } else if (type === 'records') {
          const res = await fetch('/api/records', { headers: { 'Authorization': 'Bearer ' + token } });
          data = await res.json();
          filename = 'borrow_records.csv';
          cols = ['code', 'title', 'borrow_date', 'due_date', 'return_date', 'returned', 'username'];
        } else {
          const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
          data = await res.json();
          filename = 'users.csv';
          cols = ['username', 'display_name', 'role', 'created_at'];
        }

        // Preview
        const preview = document.getElementById('exportPreviewContainer');
        if (data.length === 0) {
          preview.innerHTML = '<div class="empty-state">' + t('noBooks') + '</div>';
          return;
        }
        const previewRows = data.slice(0, 10);
        preview.innerHTML = `<div class="export-preview-table"><table>
          <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${previewRows.map(row => `<tr>${cols.map(c => `<td>${escHtml(String(row[c] || ''))}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>
        <p style="margin-top:8px;font-size:0.85rem;color:#7F8C8D;">${data.length} rows total</p>
        <button class="btn btn-success" style="margin-top:12px;" onclick="downloadCSV('${type}')">${t('exportDownload')}</button>`;
      } catch { showToast('Export error', 'error'); }
    }

    async function downloadCSV(type) {
      try {
        let data, cols;
        if (type === 'books') {
          cols = ['book_id', 'title', 'author_name', 'isbn', 'location', 'status'];
          data = batchBooksCache;
        } else if (type === 'records') {
          const res = await fetch('/api/records', { headers: { 'Authorization': 'Bearer ' + token } });
          data = await res.json();
          cols = ['code', 'title', 'borrow_date', 'due_date', 'return_date', 'returned', 'username'];
        } else {
          const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
          data = await res.json();
          cols = ['username', 'display_name', 'role', 'created_at'];
        }

        const rows = data || [];
        let csvContent = cols.join(',') + '\n';
        rows.forEach(row => {
          csvContent += cols.map(c => {
            const val = String(row[c] || '');
            return val.includes(',') ? '"' + val.replace(/"/g, '""') + '"' : val;
          }).join(',') + '\n';
        });

        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = type + '_export.csv';
        a.click();
        URL.revokeObjectURL(url);
      } catch { showToast('Download error', 'error'); }
    }

    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
    });
  </script>
